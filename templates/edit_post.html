<!DOCTYPE html>
<html>
<head>
	<title>Edit Post</title>
</head>
<body>
	<h1>Edit Post</h1>
	<form action="{{ url_for('save_post', index=post['id']) }}" method="post">
		<label for="title">Title:</label>
		<input type="text" name="title" id="title" value="{{ post['title'] }}"><br>
		<label for="content">Content:</label>
		<textarea name="content" rows="10" cols="50">{{ post["content"] }}</textarea><br>
        <label for="paper">Paper:</label>
		<input type="text" name="paper" id="paper" value="{{ post['paper'] }}"><br>
		<input type="submit" value="Save">
	</form>
</body>
</html>
