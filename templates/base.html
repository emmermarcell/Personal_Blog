<!DOCTYPE html>
<html lang="">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KK94CHFLLe+nY2dmCWGMq91rCGa5gtU4mk92HdvYe+M/SXH301p5ILy+dN9+nJOZ" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.24.1/themes/prism.min.css" integrity="sha512-EKfOITShP4oQ4Th+gDjyE1H7OkgN3q1EW7aFZoQ/BK49Nphz0f+VtAtRyIVlEM9XeJGg6PKPv6OghU6IYUf+1A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.24.1/components/prism-core.min.js" integrity="sha512-i7rv+1F88KZtzyGZtYJ+2mb8zjJtxM7NCqJms3uE7s8fr+K/Nl2H4sZ4lknzGjBbyxToBkQuTfT+tT7sDOsagA==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.24.1/plugins/autoloader/prism-autoloader.min.js" integrity="sha512-gaNgAmhzMue8i5v5kZ1q3Zjw+NzW8BnOm05CCX9n+GJjKU/va93GgOjmN7wd0/D0pETh3sYFPHra6UJOMZUu/g==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <style>
      .navbar {
      width: 100%;
      max-width: 100%;
      height: 100%;
      max-height: 100%;
      background-color: lightsteelblue; /* Darken the navbar */
    }

    .navbar-brand,
    .navbar-nav .nav-link {
      color: #bbbbbb;
    }

    .navbar-brand:hover,
    .navbar-nav .nav-link:hover {
      color: darkslategray; /* Change hover color to white */
      text-shadow: 0 0 10px rgba(255,255,255,0.8); /* Add text shadow to make it more visible */
    }

    .navbar-toggler {
      border-color: #bbb;
    }

    .navbar-toggler-icon {
      background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 30 30' xmlns='http://www.w3.org/2000/svg'%3e%3cpath stroke='rgba(0, 0, 0, 0.5)' stroke-width='2' stroke-linecap='round' stroke-miterlimit='10' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
    }
      .profile-pic {
        border-radius: 50%;
        width: 150px;
        height: 150px;
        object-fit: cover;
        float: right;
        margin: 20px;
      }
      .category {
        margin-top: 50px;
      }
      .category h2 {
        margin-bottom: 20px;
      }
      .navbar-nav .nav-link {
        height: 50px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/clipboard.js/2.0.8/clipboard.min.js"></script>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="{{ url_for('home') }}">Home</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="{{ url_for('interest_blog') }}">Interests</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" aria-current="page" href="{{ url_for('study_blog') }}">Studies</a>
            </li>
          </ul>
          <img src="../static/pictures/hungarian_flag.gif" alt="Hungarian flag" class="d-inline-block align-text-top flag">
        </div>
      </div>
    </nav>

    <style>
      .flag {
        max-height: 30px;
        margin-left: 10px;
      }
    </style>
    {% block content %}
    {% endblock %}
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ENjdO4Dr2bkBIFxQpeoTz1HIcje39Wm4jDKdf19U8gI4ddQ3GYNS7NTKfAdVQSZe" crossorigin="anonymous"></script>
  <script>
    Prism.highlightAll();
  </script>
  </body>
</html>
